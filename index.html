<!DOCTYPE html>
<html>
<head>
    <title>Images</title>
    <style>
        * {box-sizing: border-box}

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #000;
            font-family: sans-serif
        }

        .ScrollFrame {
            width: 100%;
            height: 100vh;
            padding: 16px;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(9, 1fr);
            gap: 16px
        }

        .ImageBox {
            width: 100%;
            height: 100%;
            background: #111;
            border: 2px solid #222;
            border-radius: 14px;
            overflow: hidden;
            display: flex
        }

        .ImageBox img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            cursor: pointer
        }

        .Controls {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10
        }

        .Controls button {
            padding: 8px 16px;
            background: #222;
            color: #fff;
            border: 1px solid #444;
            border-radius: 8px;
            cursor: pointer
        }

        .Controls button:disabled {
            opacity: 0.5
        }

        .Viewer {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 100
        }

        .Viewer img {
            max-width: 90vw;
            max-height: 80vh
        }

        .ViewerDate {
            margin-top: 12px;
            color: #aaa;
            font-size: 14px
        }
    </style>
</head>
<body>

<div id="grid" class="ScrollFrame"></div>

<div class="Controls">
    <button id="previous">&larr;</button>
    <button id="next">&rarr;</button>
</div>

<div id="viewer" class="Viewer">
    <img id="viewerImage">
    <div id="viewerDate" class="ViewerDate"></div>
</div>

<script>
    let Page = 1
    const PageCache = {}

    const Grid = document.getElementById("grid")
    const PreviousButton = document.getElementById("previous")
    const NextButton = document.getElementById("next")

    const Viewer = document.getElementById("viewer")
    const ViewerImage = document.getElementById("viewerImage")
    const ViewerDate = document.getElementById("viewerDate")

    async function LoadPage() {
        if (PageCache[Page]) {
            Render(PageCache[Page])
            return
        }

        const Response = await fetch("/images?page=" + Page)
        const Data = await Response.json()

        PageCache[Page] = Data
        Render(Data)
    }

    function Render(Data) {
        Grid.innerHTML = ""

        Data.Images.forEach(Item => {
            const File = Item.File
            const DateValue = Item.Date

            const ImageBox = document.createElement("div")
            ImageBox.className = "ImageBox"

            const Image = document.createElement("img")
            Image.src = "/images/" + File
            Image.loading = "lazy"

            Image.onclick = () => {
                Viewer.style.display = "flex"
                ViewerImage.src = Image.src
                ViewerDate.textContent = DateValue ? `Date: ${DateValue}` : "Date: Unknown"
            }

            ImageBox.appendChild(Image)
            Grid.appendChild(ImageBox)
        })

        PreviousButton.disabled = Page === 1
        NextButton.disabled = !Data.HasNext
    }

    Viewer.onclick = () => {
        Viewer.style.display = "none"
        ViewerImage.src = ""
        ViewerDate.textContent = ""
    }

    PreviousButton.onclick = () => {
        if (Page > 1) {
            Page--
            LoadPage()
        }
    }

    NextButton.onclick = () => {
        Page++
        LoadPage()
    }

    LoadPage()
</script>
</body>
</html>
